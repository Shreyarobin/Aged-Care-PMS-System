services:
  db:
    image: timescale/timescaledb:latest-pg15
    container_name: pms-db
    restart: always
    environment:
      POSTGRES_USER: pms_admin
      POSTGRES_PASSWORD: localdevpassword
      POSTGRES_DB: pms_platform
    ports:
      - "5432:5432"
    volumes:
      - pms_db_data:/var/lib/postgresql/data

volumes:
  pms_db_data: